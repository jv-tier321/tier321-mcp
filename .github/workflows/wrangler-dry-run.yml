name: Wrangler dry run

on:
  pull_request:

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Wrangler dry-run build
        run: npx wrangler deploy --dry-run --outdir=./dist
