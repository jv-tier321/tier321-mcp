name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    name: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Test
        run: npm test
      - name: Build
        run: npx wrangler deploy --dry-run --outdir=./dist
      - name: GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: dist/**/*
